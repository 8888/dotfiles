# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support (critical for iPhone — tap to select pane, scroll)
set -g mouse on

# Scrollback buffer
set -g history-limit 50000

# Fast escape (reduces SSH latency for key sequences)
set -sg escape-time 10

# Increase repeat timeout for resizing panes
set -g repeat-time 500

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=white]%H:%M "
set -g status-right-length 20

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=green,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# Split panes with sensible keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows inherit current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
