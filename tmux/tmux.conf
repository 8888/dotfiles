# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# OSC52 clipboard passthrough to the attached terminal's clipboard
# (e.g. WezTerm on the local Mac, over SSH).
# - `set-clipboard on` lets app-origin OSC52 sequences (e.g. from nvim) flow
#   through tmux to the outer terminal, which does reach WezTerm.
# - tmux-origin OSC52 (set-buffer -w, copy-pipe under set-clipboard=on) does
#   NOT reliably land in WezTerm's clipboard in this setup. So copy actions
#   bypass tmux's emission and write OSC52 directly to `#{client_tty}`.
# Use `external` (not `on`): app-origin OSC52 (nvim) still passes through, but
# tmux no longer emits its OWN competing OSC52 on copy-pipe — which raced the
# manual client_tty write and intermittently cleared the live pasteboard
# (text showed in clipboard history but Cmd+V pasted nothing).
set -g set-clipboard external
set -as terminal-features ',*:clipboard'

bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "base64 -w0 | { printf '\\033]52;c;'; cat; printf '\\a'; } > $(tmux display -p '#{client_tty}')"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "base64 -w0 | { printf '\\033]52;c;'; cat; printf '\\a'; } > $(tmux display -p '#{client_tty}')"
bind-key -T copy-mode    Enter             send-keys -X copy-pipe-and-cancel "base64 -w0 | { printf '\\033]52;c;'; cat; printf '\\a'; } > $(tmux display -p '#{client_tty}')"
bind-key -T copy-mode-vi Enter             send-keys -X copy-pipe-and-cancel "base64 -w0 | { printf '\\033]52;c;'; cat; printf '\\a'; } > $(tmux display -p '#{client_tty}')"

# Mouse support (critical for iPhone — tap to select pane, scroll)
set -g mouse on

# Scrollback buffer
set -g history-limit 50000

# Fast escape (reduces SSH latency for key sequences)
set -sg escape-time 10

# Increase repeat timeout for resizing panes
set -g repeat-time 500

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
# Don't restyle inactive window titles when activity is detected
setw -g window-status-activity-style "fg=white,bg=default"
setw -g window-status-bell-style "fg=white,bg=default"

# Status bar
# Solid background gives the bar a visible "floor" so it reads as tmux chrome,
# clearly separated from the pane content / shell prompt powerline above it.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour236,fg=colour250"
set -g status-left "#[fg=colour235,bg=colour114,bold] #S #[fg=colour114,bg=colour236]#[default]"
set -g status-left-length 20
set -g status-right "#[fg=colour245] %H:%M "
set -g status-right-length 20

# Window status
# Auto-name windows after the current directory basename (instead of the
# foreground command) so multiple `claude` sessions stay distinguishable.
# Manual `rename-window` still wins — tmux disables auto-rename for that window.
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
setw -g window-status-format "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour235,bg=colour114,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# Split panes with sensible keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows inherit current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
