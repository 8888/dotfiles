# ~/.config/starship.toml (managed via dotfiles/starship.toml)

# 2-line prompt layout
format = """
$directory$git_branch$git_status$git_state\
$fill\
$status$cmd_duration$jobs$direnv$python$nodejs$username$hostname\
$line_break\
$character[❯](yellow) """

[fill]
symbol = " "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = " [$path]($style) "

[git_branch]
symbol = "[](bold purple) "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = "$ahead_behind$staged$modified$untracked$deleted$conflicted "
ahead = "[⇡${count}](green)"
behind = "[⇣${count}](red)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](red)"
staged = "[+${count}](green)"
modified = "[!${count}](yellow)"
untracked = "[?${count}](red)"
deleted = "[-${count}](red)"
conflicted = "[~${count}](red)"

[character]
success_symbol = "[](yellow)"
error_symbol = "[󰯆](red)"

[status]
disabled = false
style = "bold red"

[cmd_duration]
min_time = 2_000
format = "[$duration 󰔟](blue) "

[jobs]
symbol = "✦"
style = "bold blue"

[direnv]
disabled = false
format = '[$symbol$loaded/$allowed]($style) '

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
symbol = " "

[username]
show_always = false
format = "[$user]($style)@"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
