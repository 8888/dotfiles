# Policy Engine configuration for Gemini CLI tools
# This replaces the deprecated `tools.allowed` in `settings.json`.

[[rule]]
mcpName = "azure"
toolName = "applens"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "ls"
decision = "allow"
priority = 100

